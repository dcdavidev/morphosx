name: Release and Publish Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "morphosx/app/__init__.py"
  workflow_dispatch:

jobs:
  release:
    name: Automated Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      new_tag: ${{ steps.check-tag.outputs.new_tag }}
      tag_name: ${{ steps.check-tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.2
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Release
        run: poetry run poe release || echo "No changes to bump"

      - name: Check for new tag and push
        id: check-tag
        run: |
          TAG=$(git tag --points-at HEAD | head -n 1)
          if [ -n "$TAG" ]; then
            git push origin main --follow-tags
            echo "new_tag=true" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          else
            echo "No new tag created, skipping push."
            echo "new_tag=false" >> $GITHUB_OUTPUT
          fi

  pypi-publish:
    name: Build and publish to PyPI
    needs: release
    if: |
      always() &&
      !cancelled() &&
      !failure() &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch' ||
        needs.release.outputs.new_tag == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.2
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  docker-publish:
    name: Publish Docker Image
    needs: release
    if: |
      always() &&
      !cancelled() &&
      !failure() &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch' ||
        needs.release.outputs.new_tag == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      DOCKERHUB_REPO: dcdavidev/morphosx
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.tag_name || github.ref }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
