# Lefthook configuration for MorphosX
# For details: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
    pytest:
      run: uv run pytest tests/ -n auto --dist loadscope
      tags: backend test
      stage_fixed: true

pre-push:
  commands:
    full-test:
      run: uv run pytest tests/
    full-lint:
      run: uv run ruff check .
